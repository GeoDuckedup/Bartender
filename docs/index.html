import sys
import asyncio
import platform

from pathlib import Path

# do not rename
async def custom_site():
    import embed
    platform.document.body.style.background = "#160b06"

    platform.window.transfer.hidden = true
    platform.window.canvas.style.visibility = "visible"


    bundle = "tapper"

    # the C or js loader could do that but be explicit.
    appdir = Path(f"/data/data/{bundle}") # /data/data/tapper
    appdir.mkdir()


    # unpack filesystem from compressed archive into work dir
    if platform.window.location.host.find('.itch.zone')>0:
        import zipfile
        async with platform.fopen("tapper.apk", "rb") as archive:
            with zipfile.ZipFile(archive) as zip_ref:
                zip_ref.extractall(appdir.as_posix())
    else:
        import tarfile
        async with platform.fopen("tapper.tar.gz", "rb") as archive:
            tar = tarfile.open(fileobj=archive, mode="r:gz")
            tar.extractall(path=appdir.as_posix(), filter='tar')
            tar.close()

    # preloader will change to work dir and prepend it to sys.path
    platform.run_main(PyConfig, loaderhome= appdir / "assets", loadermain=None)


    # wait preloading complete : that includes images and wasm compilation of bundled modules
    while embed.counter()<0:
        await asyncio.sleep(.1)

    main = appdir / "assets" / "main.py"

    # TODO: test for window.webkitAudioContext and block aio loop until gesture if accessing media manager play
    # before a gesture is recorded ( touch or click )

    # test/wait user media interaction
    if not platform.window.MM.UME:

        # now that apk is mounted we have access to font cache
        # but we need to fill __file__ that is not yet set
        __import__(__name__).__file__ = main

        # now make a prompt
        msg  = """
<div class="infobox-title">BARTENDER</div>
<div class="infobox-subtitle">PRESS SPACEBAR TO START</div>
<div class="infobox-controls">
    <div class="infobox-action">
        <div class="infobox-action-label">MOVE</div>
        <div class="infobox-keyboards">
            <div class="key-cluster">
                <div class="key-row">
                    <span class="key key-empty"></span>
                    <span class="key">W</span>
                    <span class="key key-empty"></span>
                </div>
                <div class="key-row">
                    <span class="key">A</span>
                    <span class="key">S</span>
                    <span class="key">D</span>
                </div>
            </div>
            <div class="infobox-or">OR</div>
            <div class="key-cluster">
                <div class="key-row">
                    <span class="key key-empty"></span>
                    <span class="key key-arrow">&uarr;</span>
                    <span class="key key-empty"></span>
                </div>
                <div class="key-row">
                    <span class="key key-arrow">&larr;</span>
                    <span class="key key-arrow">&darr;</span>
                    <span class="key key-arrow">&rarr;</span>
                </div>
            </div>
        </div>
    </div>
    <div class="infobox-action">
        <div class="infobox-action-label">POUR BEER</div>
        <div class="spacebar-key">SPACEBAR</div>
    </div>
</div>
"""
        platform.window.infobox.innerHTML = msg
        print("\n"*4, f"    * Waiting for media user engagement. {msg} *" , "\n"*4)

        while not platform.window.MM.UME:
            await asyncio.sleep(.1)

        platform.window.document.body.classList.add("started")
        if hasattr(platform.window, "hideSplashArt"):
            platform.window.hideSplashArt()
        if hasattr(platform.window, "focusCanvas"):
            platform.window.focusCanvas()

    # start async top level machinery if not started and add a console in any case if requested.
    await TopLevel_async_handler.start_toplevel(platform.shell, console=window.python.config.debug)

    # now that apk is mounted we have access to font cache
    # but we need to fill __file__/__name__ that are not yet set
    __import__(__name__).__file__ = main


    def ui_callback(pkg):
        platform.window.infobox.innerHTML = f"""
<div class="infobox-title">BARTENDER</div>
<div class="infobox-subtitle">LOADING</div>
<div class="infobox-note">INSTALLING {pkg.upper()}</div>
"""

    await shell.source(main, callback=ui_callback)

    # if you don't reach that step
    # your main.py has an infinite sync loop somewhere !

    platform.window.infobox.style.display = "none"
    platform.window.config.gui_divider = 1
    platform.window.window_resize()
    print("default.tmpl: done")

    shell.interactive()

function show_infobox() {
    infobox.style.display = "block";

    // Measure box
    const w = infobox.offsetWidth;
    const h = infobox.offsetHeight;

    // Center horizontally and anchor lower over the poster without stretching.
    const left = (window.innerWidth - w) / 2;
    const top = Math.min(
        window.innerHeight - h - 32,
        Math.max(24, (window.innerHeight * 0.62) - (h / 2))
    );

    infobox.style.left = left + "px";
    infobox.style.top = top + "px";
}

    async function custom_onload(debug_hidden) {
        // this is called before anything python is loaded
        // make your js customization here
        console.log(__FILE__, "custom_onload")

        pyconsole.hidden = debug_hidden
        system.hidden = debug_hidden
        transfer.hidden = debug_hidden
        info.hidden = debug_hidden
        box.hidden =  debug_hidden

        show_infobox()

        const blockedKeys = new Set([
            "ArrowUp",
            "ArrowDown",
            "ArrowLeft",
            "ArrowRight",
            "Up",
            "Down",
            "Left",
            "Right",
            " ",
            "Spacebar",
            "w",
            "W",
            "a",
            "A",
            "s",
            "S",
            "d",
            "D",
            "f",
            "F",
        ])

        const focusCanvas = () => {
            canvas.setAttribute("tabindex", "0")
            if (typeof window.focus === "function") {
                window.focus()
            }
            try {
                canvas.focus({ preventScroll: true })
            } catch (_error) {
                canvas.focus()
            }
        }
        window.focusCanvas = focusCanvas

        const hideSplashArt = () => {
            const splashArt = document.getElementById("splash-art")
            if (!splashArt) {
                return
            }
            document.body.classList.add("started")
            splashArt.style.opacity = "0"
            splashArt.style.visibility = "hidden"
            splashArt.style.pointerEvents = "none"
            splashArt.style.display = "none"
        }

        window.hideSplashArt = hideSplashArt

        const needsDirectionalKeyBridge = /^((?!chrome|android).)*safari/i.test(navigator.userAgent)
        window.codexInputBridge = window.codexInputBridge || { queue: [] }

        const bridgeDirectionalKey = (event) => {
            if (!needsDirectionalKeyBridge || event.repeat) {
                return
            }
            const directionalKeyMap = {
                ArrowUp: "UP",
                Up: "UP",
                ArrowDown: "DOWN",
                Down: "DOWN",
                ArrowLeft: "LEFT",
                Left: "LEFT",
                ArrowRight: "RIGHT",
                Right: "RIGHT",
                w: "UP",
                W: "UP",
                a: "LEFT",
                A: "LEFT",
                s: "DOWN",
                S: "DOWN",
                d: "RIGHT",
                D: "RIGHT",
            }
            const bridgedKey = directionalKeyMap[event.key]
            if (bridgedKey) {
                window.codexInputBridge.queue.push(bridgedKey)
            }
        }

        ;["click", "mousedown", "touchstart"].forEach((eventName) => {
            canvas.addEventListener(
                eventName,
                () => {
                    focusCanvas()
                    if (window.MM && window.MM.UME) {
                        hideSplashArt()
                    }
                },
                { passive: true }
            )
            document.addEventListener(
                eventName,
                () => {
                    focusCanvas()
                    if (window.MM && window.MM.UME) {
                        hideSplashArt()
                    }
                },
                { passive: true }
            )
        })

        window.addEventListener(
            "keydown",
            (event) => {
                bridgeDirectionalKey(event)
                if (blockedKeys.has(event.key)) {
                    event.preventDefault()
                    focusCanvas()
                    if ((event.key === " " || event.key === "Spacebar") && window.MM && !window.MM.UME) {
                        window.MM.UME = true
                    }
                    if (window.MM && window.MM.UME) {
                        hideSplashArt()
                    }
                }
            },
            { capture: true }
        )

        window.addEventListener(
            "keyup",
            (event) => {
                if (blockedKeys.has(event.key)) {
                    event.preventDefault()
                    focusCanvas()
                }
            },
            { capture: true }
        )
    }

            .then((html) => {

        })
        .catch((error) => {
            console.warn(error);
        });
